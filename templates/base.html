<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}dtuSTAKES{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0f; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .glass-strong { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); }
    .muted { color: #94a3b8; }
    .brand-btn { background: linear-gradient(135deg,#06b6d4,#8b5cf6); color:#fff; border:none; cursor:pointer; transition:opacity .2s; }
    .brand-btn:hover { opacity:.85; }
    .outline-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color:#e2e8f0; cursor:pointer; transition:all .2s; }
    .outline-btn:hover { background: rgba(255,255,255,0.05); }
    .shadow-soft { box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

    /* ── Matka Card Flip ── */
    .matka-card { perspective: 1200px; display:inline-block; }
    .matka-card-inner {
      position:relative; width:72px; height:100px;
      transition: transform 0.9s cubic-bezier(0.68,-0.55,0.265,1.55);
      transform-style: preserve-3d;
    }
    .matka-card.flipped .matka-card-inner { transform: rotateY(180deg); }
    .matka-card-front, .matka-card-back {
      position:absolute; width:100%; height:100%; backface-visibility:hidden;
      border-radius:14px; display:flex; align-items:center; justify-content:center;
      font-size:2rem; font-weight:900; box-shadow:0 8px 24px rgba(0,0,0,0.4);
    }
    .matka-card-front { background:linear-gradient(135deg,#1e293b,#334155); color:#64748b; border:2px solid rgba(255,255,255,0.1); }
    .card-open .matka-card-back { background:linear-gradient(135deg,#0891b2,#7c3aed); color:#fff; transform:rotateY(180deg); }
    .card-close .matka-card-back { background:linear-gradient(135deg,#dc2626,#ea580c); color:#fff; transform:rotateY(180deg); }

    /* ── Reveal Glow Hold ── */
    .reveal-glow { animation: glowPulse 5s ease-in-out; }
    @keyframes glowPulse {
      0%,100% { box-shadow:0 0 20px rgba(34,211,238,0.3); }
      50% { box-shadow:0 0 60px rgba(34,211,238,0.8); }
    }

    /* ── Number Picker ── */
    .num-btn {
      width:44px; height:44px; border-radius:50%; border:2px solid rgba(255,255,255,0.2);
      background:rgba(255,255,255,0.05); color:#e2e8f0; font-weight:700; cursor:pointer;
      transition:all .15s;
    }
    .num-btn.selected { background:linear-gradient(135deg,#06b6d4,#8b5cf6); border-color:transparent; }
    .num-btn:hover:not(.selected) { border-color:#06b6d4; color:#06b6d4; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen">
  <nav class="border-b border-white/10 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-cyan-400 to-violet-500 flex items-center justify-center font-black text-white">D</div>
      <div>
        <span class="font-bold text-lg">dtuSTAKES</span>
        <span class="text-xs muted ml-2 hidden sm:inline">DTU credit-only betting simulation</span>
      </div>
    </div>
    <div class="flex gap-3 text-sm">
      {% if session.get('user_id') %}
        <a href="/dashboard" class="outline-btn px-4 py-2 rounded-xl">Dashboard</a>
        <a href="/verify" class="outline-btn px-4 py-2 rounded-xl">Verify</a>
        <a href="/logout" class="outline-btn px-4 py-2 rounded-xl">Logout</a>
      {% else %}
        <a href="/" class="outline-btn px-4 py-2 rounded-xl">Home</a>
      {% endif %}
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
